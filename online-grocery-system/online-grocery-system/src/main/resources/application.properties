# ===============================
# SERVER CONFIG
# ===============================
server.port=8085
spring.application.name=online-grocery-system


# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/onlinegrocerysystem?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sejal@28
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.default_batch_fetch_size=10


# ===============================
# JWT CONFIG
# ===============================
jwt.secret=OnlineGrocerySystemSecretKey2024ForJWTTokenGeneration
jwt.expiration=86400000
jwt.refresh-expiration=604800000


# ===============================
# CORS CONFIG
# ===============================
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true


# ===============================
# FILE UPLOAD CONFIG
# ===============================
upload.path=uploads/

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.location=uploads/


# ===============================
# STATIC FILE CONFIG
# ===============================
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,file:uploads/
spring.web.resources.add-mappings=true


# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.grocery.onlinegrocery=DEBUG


# ===============================
# OTHER SETTINGS
# ===============================
spring.main.allow-circular-references=true
spring.jackson.serialization.fail-on-empty-beans=false


